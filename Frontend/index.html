<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriPulse — Crop Price Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🌱</span>
        <span class="logo-text">AgriPulse</span>
      </div>
      <p class="tagline">Live crop prices from markets near you</p>
    </div>
  </header>

  <main class="main">

    <section class="card form-card">
      <h2 class="card-title">
        <span class="card-icon">➕</span> Add Crop Price
      </h2>
      <div class="form" id="addPriceForm">
        <div class="form-row">
          <div class="form-group">
            <label for="cropName">Crop Name</label>
            <input type="text" id="cropName" placeholder="e.g. Maize" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="market">Market</label>
            <input type="text" id="market" placeholder="e.g. Kimironko Market" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="price">Price per Kg ($)</label>
            <input type="number" id="price" placeholder="e.g. 0.85" min="0" step="0.01" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="submitBtn">Save Price</button>
          <span class="form-msg" id="formMsg"></span>
        </div>
      </div>
    </section>

    <section class="card table-card">
      <div class="table-header">
        <h2 class="card-title">
          <span class="card-icon">📊</span> Market Prices
        </h2>
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Search crops…" autocomplete="off" />
          <button class="btn btn-secondary" id="clearSearch" style="display:none">✕</button>
        </div>
      </div>

      <div class="stats-bar" id="statsBar">
        <span class="stat" id="statTotal">Loading…</span>
      </div>

      <div class="table-wrap">
        <table id="pricesTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Crop Name</th>
              <th>Market</th>
              <th>Price / Kg</th>
              <th>Last Updated</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" class="loading-row">Loading prices…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="mobile-cards" id="mobileCards"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <span class="empty-icon">🌾</span>
        <p>No crops found. Try a different search or add a new price above.</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>AgriPulse &copy; 2025 &mdash; Built for farmers &amp; traders</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
