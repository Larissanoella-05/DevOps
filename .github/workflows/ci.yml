name: CI Pipeline

on:
  push:
    branches:
      - '**'          
      - '!main'       
  pull_request:
    branches:
      - main          

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7.0.0

    - name: Set up Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22' 
        cache: 'npm'       

    # 3. Install dependencies
    - name: Install dependencies
      run: npm ci          

    - name: Run linter
      run: npm run lint    

    - name: Run tests
      run: npm test      

    - name: Build Docker image
      run: docker build . -t my-node-app:latest
